name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Derive the version from manifest.json so this works whether triggered
          # by a tag push or a manual workflow_dispatch.
          version="$(jq -r .version manifest.json)"

          if gh release view "$version" >/dev/null 2>&1; then
            echo "Release $version exists; updating assets."
            gh release upload "$version" \
              main.js manifest.json styles.css --clobber
          else
            gh release create "$version" \
              --title="$version" \
              --draft \
              main.js manifest.json styles.css
          fi
